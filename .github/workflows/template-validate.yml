name: Template validation

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "templates/pack-starter/**"
      - "packages/core/**"
      - "package-lock.json"
      - ".github/workflows/template-validate.yml"

permissions:
  contents: read

jobs:
  validate-starter-pack:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and diagnose the starter pack
        shell: bash
        run: |
          set -euo pipefail
          install_dir="$(mktemp -d)"
          cp -R templates/pack-starter/. "$install_dir/"
          cp "$install_dir/install.example.yml" "$install_dir/install.yml"
          node packages/core/bin/persona build --dir "$install_dir"
          node packages/core/bin/persona doctor --dir "$install_dir"
